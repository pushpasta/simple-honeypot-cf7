name: WP-Plugin Release Package

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set plugin variables
        run: |
          echo "PLUGIN_SLUG=${GITHUB_REPOSITORY#*/}" >> "$GITHUB_ENV"
          echo "VERSION=${{ github.event.release.tag_name }}" >> "$GITHUB_ENV"

      - name: Build distribution
        run: |
          mkdir -p "build/${{ env.PLUGIN_SLUG }}"

          RSYNC_ARGS="-av --exclude=.git --exclude=build"

          if [ -f .distignore ]; then
            RSYNC_ARGS="${RSYNC_ARGS} --exclude-from=.distignore"
          fi

          rsync ${RSYNC_ARGS} ./ "build/${{ env.PLUGIN_SLUG }}/"

      - name: Create ZIP
        run: |
          cd build
          zip -r "${{ env.PLUGIN_SLUG }}_${{ env.VERSION }}.zip" "${{ env.PLUGIN_SLUG }}"

      - name: Verify ZIP contents
        run: |
          unzip -l "build/${{ env.PLUGIN_SLUG }}_${{ env.VERSION }}.zip"

      - name: Upload ZIP to release
        run: gh release upload "$GITHUB_REF_NAME" "build/${{ env.PLUGIN_SLUG }}_${{ env.VERSION }}.zip"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
