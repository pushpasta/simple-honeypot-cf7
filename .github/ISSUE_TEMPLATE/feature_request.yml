name: "✨ Feature Request"
description: Suggest an improvement or new feature.
title: "[Feature]: "
labels:
  - enhancement

body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered

  - type: textarea
    id: additional
    attributes:
      label: Additional Context

  - type: checkboxes
    id: checks
    attributes:
      label: Verification
      options:
        - label: I searched existing feature requests.
          required: true
